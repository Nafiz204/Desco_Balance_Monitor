name: DESCO Balance Monitor

on:
  schedule:
    # Run at 01:00 UTC (07:00 AM Bangladesh Time)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-balance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run monitor
        env:
          DESCO_USER: ${{ secrets.DESCO_USER }}
          DESCO_PASS: ${{ secrets.DESCO_PASS }}
          METER_NUMBER: ${{ secrets.METER_NUMBER }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Commit and push status
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Check if the file exists and if there are changes
          if [ -f logs/status.json ]; then
            git add logs/status.json
            git commit -m "Update balance status [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "Status file logs/status.json not found, skipping commit."
          fi
